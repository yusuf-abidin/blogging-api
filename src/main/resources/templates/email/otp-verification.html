<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verifikasi Email</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<div style="max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px;">
    <h2 style="color: #333;">Verifikasi Email Anda</h2>
    <p>Halo, <strong th:text="${fullName}">Pengguna</strong>!</p>
    <p>Gunakan kode OTP berikut untuk memverifikasi email Anda:</p>
    <div style="text-align: center; margin: 30px 0;">
        <span th:text="${otp}"
              style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #4F46E5;">
            000000
        </span>
    </div>
    <p>Kode ini berlaku selama <strong th:text="${expiryMinutes}">15</strong> menit.</p>
    <p style="color: #999; font-size: 12px;">
        Jika Anda tidak merasa mendaftar, abaikan email ini.
    </p>
</div>
</body>
</html>
