<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reset Password</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
<div style="max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px;">
    <h2 style="color: #333;">Reset Password</h2>
    <p>Halo, <strong th:text="${fullName}">Pengguna</strong>!</p>
    <p>Klik tombol berikut untuk mereset password Anda:</p>
    <div style="text-align: center; margin: 30px 0;">
        <a th:href="${resetUrl}"
           style="background-color: #4F46E5; color: white; padding: 12px 24px;
                  text-decoration: none; border-radius: 6px; font-weight: bold;">
            Reset Password
        </a>
    </div>
    <p>Atau copy link berikut ke browser Anda:</p>
    <p style="word-break: break-all; color: #4F46E5;" th:text="${resetUrl}"></p>
    <p>Link ini berlaku selama <strong th:text="${expiryMinutes}">15</strong> menit.</p>
    <p style="color: #999; font-size: 12px;">
        Jika Anda tidak merasa melakukan permintaan ini, abaikan email ini.
    </p>
</div>
</body>
</html>
